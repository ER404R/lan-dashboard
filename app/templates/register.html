{% extends "base.html" %}
{% block title %}Register - LAN Dashboard{% endblock %}
{% block content %}
<article style="max-width:400px;margin:2rem auto">
    <header><h2>Register</h2></header>
    {% if not registration_enabled %}
    <p><mark>Registration is currently closed.</mark></p>
    {% else %}
    <form method="post" action="/register">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" minlength="3" maxlength="50" required autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" required>
        <label for="invite_token">Invite Token</label>
        <input type="text" id="invite_token" name="invite_token" required>
        <button type="submit">Register</button>
    </form>
    {% endif %}
    <p style="text-align:center"><a href="/login">Already have an account? Login</a></p>
</article>
{% endblock %}
